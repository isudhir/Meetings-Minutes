<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Minutes AI</title>
    <meta name="description" content="Turn any meeting recording into clear minutes, insights, and action items." />
    <meta name="theme-color" content="#F8F7F4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#100F0E" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231A1917'/%3E%3Cg stroke='%230E9366' stroke-width='2.2' stroke-linecap='round'%3E%3Cpath d='M9 13v6M13 9v14M17 11v10M21 14v4'/%3E%3C/g%3E%3C/svg%3E" />

    <!-- Google Fonts: Fraunces (serif display) + Plus Jakarta Sans (body/UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Apply persisted/preferred theme before React mounts to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : prefersDark ? 'dark' : 'light';
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage unavailable — fall back to light theme */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
